name: NodeJS

on:
  push:
    branches: ["master", "rework"]
  pull_request:
    branches: ["master", "rework"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Falls du wirklich einen Cleanup brauchst, besser explizit definieren
      # sonst eher weglassen, weil npm ci bereits "clean" ist
      # - name: Cleanup (optional)
      #   run: npm run cleanup

      - name: Build pixle-game
        run: npm run build pixle-game

      - name: Build pixle-landing
        run: npm run build pixle-landing
